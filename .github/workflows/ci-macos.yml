name: macOS CI
on: [push, pull_request]

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/external
          key: ${{ runner.os }}-external-${{ hashFiles('external/CMakeLists.txt', 'external/raylib/CMakeLists.txt', 'external/raylib/src/CMakeLists.txt') }}

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DTEST=ON

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Upload build directory
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: ${{ github.workspace }}/build

  test:
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: ${{ github.workspace }}/build

      - name: Restore execute permissions to test binaries
        run: chmod -R +x ${{ github.workspace }}/build

      - name: Run tests
        run: ctest --test-dir ${{github.workspace}}/build --output-on-failure --verbose
