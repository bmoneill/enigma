name: Windows CI
on: [push, pull_request]

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache MinGW
        id: cache-mingw
        uses: actions/cache@v4
        with:
          path: C:\ProgramData\mingw64
          key: mingw-x64

      - name: Set up MinGW
        if: steps.cache-mingw.outputs.cache-hit != 'true'
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x64

      - name: Add MinGW to PATH
        if: steps.cache-mingw.outputs.cache-hit == 'true'
        shell: pwsh
        run: echo "C:\ProgramData\mingw64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/external
          key: ${{ runner.os }}-external-${{ hashFiles('external/CMakeLists.txt', 'external/raylib/CMakeLists.txt', 'external/raylib/src/CMakeLists.txt') }}

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -G "MinGW Makefiles" -DTEST=ON

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Upload build directory
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: ${{ github.workspace }}/build

  test:
    runs-on: windows-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: ${{ github.workspace }}/build

      - name: Cache MinGW
        id: cache-mingw
        uses: actions/cache@v4
        with:
          path: C:\ProgramData\mingw64
          key: mingw-x64

      - name: Set up MinGW
        if: steps.cache-mingw.outputs.cache-hit != 'true'
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x64

      - name: Add MinGW to PATH
        if: steps.cache-mingw.outputs.cache-hit == 'true'
        shell: pwsh
        run: echo "C:\ProgramData\mingw64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Run tests
        run: ctest --test-dir ${{github.workspace}}/build --output-on-failure --verbose
